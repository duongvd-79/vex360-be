spring:
  application:
    name: vex360
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # JPA Config
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway Configuration
  flyway:
    enabled: false
    baseline-on-migrate: true

  # Mail Server Configuration
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            
  # Asset Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# Custom Application Settings
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  payos:
    client-id: ${PAYOS_CLIENT_ID:mock_client_id}
    api-key: ${PAYOS_API_KEY:mock_api_key}
    checksum-key: ${PAYOS_CHECKSUM_KEY:mock_checksum_key}
    
  # JWT Settings
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}

  # Security Whitelist
  security:
    oauth2:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}

      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5175/auth/callback/google}
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
    whitelist: /api/v1/auth/**,/api/v1/partnership-requests/guest,/api/v1/package-templates/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html,/api/v1/webhooks/payos/**,/api/v1/public/exhibitions/**
    strict-mode: ${SECURITY_STRICT_MODE:true}
    token-encryption-key: ${TOKEN_ENCRYPTION_KEY}

  # Reset Password Configuration
  backend:
    base-url: ${BACKEND_BASE_URL:http://localhost:8080}
  reset-password:
    frontend-url: ${RESET_PASSWORD_FRONTEND_URL:http://localhost:5173/reset-password}
  registration:
    frontend-url: ${REGISTRATION_FRONTEND_URL:http://localhost:5173/login}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://${LOCAL_DB_HOST:localhost}:${LOCAL_DB_PORT:3306}/${LOCAL_DB_NAME:vex360}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${LOCAL_DB_USER:root}
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

---
spring:
  config:
    activate:
      on-profile: aiven
  datasource:
    url: jdbc:mysql://${AIVEN_DB_HOST}:${AIVEN_DB_PORT}/${AIVEN_DB_NAME}?createDatabaseIfNotExist=true&useSSL=true&allowPublicKeyRetrieval=true
    username: ${AIVEN_DB_USER}
    password: ${AIVEN_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

