spring:
  application:
    name: vex360
  config:
    import: optional:file:.env[.properties]

  # Database Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Config
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway Configuration
  flyway:
    enabled: false
    baseline-on-migrate: true

  # Mail Server Configuration
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            
  # Asset Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# Custom Application Settings
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
  payos:
    client-id: ${PAYOS_CLIENT_ID:mock_client_id}
    api-key: ${PAYOS_API_KEY:mock_api_key}
    checksum-key: ${PAYOS_CHECKSUM_KEY:mock_checksum_key}
    
  # JWT Settings
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}

  # Security Whitelist
  security:
    whitelist: /api/v1/auth/**,/api/v1/partnership-requests/guest,/api/v1/package-templates/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html,/api/v1/webhooks/payos/**,/api/v1/public/exhibitions/**
    strict-mode: ${SECURITY_STRICT_MODE:true}

  # Reset Password Configuration
  backend:
    base-url: ${BACKEND_BASE_URL:http://localhost:8080}
  reset-password:
    frontend-url: ${RESET_PASSWORD_FRONTEND_URL:http://localhost:5173/reset-password}
  registration:
    frontend-url: ${REGISTRATION_FRONTEND_URL:http://localhost:5173/login}

